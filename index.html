<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: black;
}

/* 开场视频 */
#introVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 主页面 */
#main {
    display: none;
    width: 100%;
    height: 100vh;
    background: url("bg.jpg") center/cover no-repeat;
    color: white;
    text-align: center;
}

/* 遮罩 */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* 内容 */
.content {
    position: relative;
    top: 20%;
}

/* 蛋糕 */
.cake {
    font-size: 90px;
    cursor: pointer;
    margin-top: 20px;
}

/* 打字 */
.typing {
    width: 70%;
    margin: 20px auto;
    font-size: 22px;
    line-height: 1.6;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;
}
</style>
</head>

<body>

<!-- 🎬 开场视频 -->
<video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
</video>

<!-- 🎵 背景音乐 -->
<audio id="bgm" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- 主页面 -->
<div id="main">

    <div class="overlay"></div>

    <div class="content">
        <h1>🎉 Happy Birthday 🎉</h1>

        <div class="cake" onclick="blowCandle()">
            🎂🕯️
        </div>

        <p id="msg" class="typing"></p>
    </div>

</div>

<script>

const text = "愿你在未来的每一天都被温柔以待，生日快乐 🎉";
let i = 0;

// 视频结束进入主页
document.getElementById("introVideo").onended = function(){
    document.getElementById("introVideo").style.display = "none";
    document.getElementById("main").style.display = "block";
};

// 打字
function type(){
    if(i < text.length){
        document.getElementById("msg").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 80);
    }
}

// 蛋糕点击
function blowCandle(){
    document.querySelector(".cake").innerHTML = "🎂✨";
    document.getElementById("bgm").play();
}

// 视频结束后启动打字
setTimeout(type, 6000);

</script>

</body>
</html>
